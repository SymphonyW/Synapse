services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway-go/Dockerfile
      args:
        GOLANG_BASE: ${GOLANG_BASE:-docker.io/library/golang:1.25}
        RUNTIME_BASE: ${RUNTIME_BASE:-gcr.io/distroless/static-debian12:latest}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    environment:
      SYNAPSE_HTTP_ADDR: ":8080"
      SYNAPSE_AI_ENGINE_ADDR: "ai-engine:50051"
      SYNAPSE_DATABASE_URL: "postgres://synapse:synapse@postgres:5432/synapse?sslmode=disable"
      SYNAPSE_DB_CONNECT_TIMEOUT: "5s"
      SYNAPSE_REDIS_ADDR: "redis:6379"
      SYNAPSE_TASK_QUEUE: "synapse:tasks"
      SYNAPSE_TASK_MAX_ATTEMPTS: "3"
      SYNAPSE_TASK_RETRY_BACKOFF: "2s"
      SYNAPSE_TASK_EXEC_TIMEOUT: "120s"
      SYNAPSE_HTTP_READ_TIMEOUT: "15s"
      SYNAPSE_HTTP_WRITE_TIMEOUT: "60s"
      SYNAPSE_AUTH_ADMIN_USERNAME: "${SYNAPSE_AUTH_ADMIN_USERNAME:-admin}"
      SYNAPSE_AUTH_ADMIN_PASSWORD: "${SYNAPSE_AUTH_ADMIN_PASSWORD:-123456}"
    ports:
      - "8080:8080"
    depends_on:
      - ai-engine
      - postgres
      - redis

  ai-engine:
    build:
      context: .
      dockerfile: services/ai-engine-py/Dockerfile
      args:
        PYTHON_BASE: ${PYTHON_BASE:-docker.io/library/python:3.12-slim}
    environment:
      SYNAPSE_AI_BIND_ADDR: "0.0.0.0:50051"
      SYNAPSE_MODEL_PROVIDER: "${SYNAPSE_MODEL_PROVIDER:-mock}"
      SYNAPSE_MODEL_PROVIDER_ALIAS: "${SYNAPSE_MODEL_PROVIDER_ALIAS:-}"
      SYNAPSE_OPENAI_API_KEY: "${SYNAPSE_OPENAI_API_KEY:-}"
      SYNAPSE_OPENAI_BASE_URL: "${SYNAPSE_OPENAI_BASE_URL:-}"
      SYNAPSE_OPENAI_MODEL: "${SYNAPSE_OPENAI_MODEL:-gpt-4o-mini}"
      SYNAPSE_OPENAI_TEMPERATURE: "${SYNAPSE_OPENAI_TEMPERATURE:-0.2}"
      SYNAPSE_OPENAI_MAX_TOKENS: "${SYNAPSE_OPENAI_MAX_TOKENS:-512}"
      SYNAPSE_OPENAI_HTTP_TIMEOUT_SECONDS: "${SYNAPSE_OPENAI_HTTP_TIMEOUT_SECONDS:-45}"
      SYNAPSE_OPENAI_MAX_RETRIES: "${SYNAPSE_OPENAI_MAX_RETRIES:-3}"
      SYNAPSE_OPENAI_RETRY_BACKOFF_SECONDS: "${SYNAPSE_OPENAI_RETRY_BACKOFF_SECONDS:-1.5}"
      SYNAPSE_AGENT_ENABLED_DEFAULT: "${SYNAPSE_AGENT_ENABLED_DEFAULT:-true}"
      SYNAPSE_AGENT_MAX_PLAN_STEPS: "${SYNAPSE_AGENT_MAX_PLAN_STEPS:-6}"
      SYNAPSE_AGENT_REQUIRE_APPROVAL_FOR_HIGH_RISK: "${SYNAPSE_AGENT_REQUIRE_APPROVAL_FOR_HIGH_RISK:-true}"
      SYNAPSE_AGENT_MEMORY_FILE: "${SYNAPSE_AGENT_MEMORY_FILE:-/var/lib/synapse/agent-memory.json}"
      SYNAPSE_AGENT_MEMORY_MAX_ENTRIES_PER_USER: "${SYNAPSE_AGENT_MEMORY_MAX_ENTRIES_PER_USER:-80}"
      SYNAPSE_AGENT_MEMORY_RECALL_LIMIT: "${SYNAPSE_AGENT_MEMORY_RECALL_LIMIT:-3}"
      SYNAPSE_AGENT_TOOL_HTTP_ALLOWLIST: "${SYNAPSE_AGENT_TOOL_HTTP_ALLOWLIST:-}"
      SYNAPSE_AGENT_TOOL_HTTP_TIMEOUT_SECONDS: "${SYNAPSE_AGENT_TOOL_HTTP_TIMEOUT_SECONDS:-12}"
      SYNAPSE_AGENT_ENABLE_CODE_EXECUTION: "${SYNAPSE_AGENT_ENABLE_CODE_EXECUTION:-false}"
      SYNAPSE_AGENT_TOOL_POLICY_JSON: "${SYNAPSE_AGENT_TOOL_POLICY_JSON:-}"
      SYNAPSE_AGENT_TOOL_AUDIT_LOG_FILE: "${SYNAPSE_AGENT_TOOL_AUDIT_LOG_FILE:-/var/lib/synapse/agent-tool-audit.log}"
    ports:
      - "50051:50051"
    volumes:
      - ai_engine_data:/var/lib/synapse

  postgres:
    image: ${POSTGRES_IMAGE:-docker.io/library/postgres:16-alpine}
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-docker.io/library/redis:7-alpine}
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  ai_engine_data:
