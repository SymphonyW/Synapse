services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway-go/Dockerfile
      args:
        GOLANG_BASE: ${GOLANG_BASE:-docker.io/library/golang:1.25}
        RUNTIME_BASE: ${RUNTIME_BASE:-gcr.io/distroless/static-debian12:latest}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    environment:
      SYNAPSE_HTTP_ADDR: ":8080"
      SYNAPSE_AI_ENGINE_ADDR: "ai-engine:50051"
      SYNAPSE_DATABASE_URL: "postgres://synapse:synapse@postgres:5432/synapse?sslmode=disable"
      SYNAPSE_REDIS_ADDR: "redis:6379"
      SYNAPSE_TASK_QUEUE: "synapse:tasks"
      SYNAPSE_TASK_MAX_ATTEMPTS: "3"
      SYNAPSE_TASK_RETRY_BACKOFF: "2s"
      SYNAPSE_TASK_EXEC_TIMEOUT: "120s"
    ports:
      - "8080:8080"
    depends_on:
      - ai-engine
      - postgres
      - redis

  ai-engine:
    build:
      context: .
      dockerfile: services/ai-engine-py/Dockerfile
      args:
        PYTHON_BASE: ${PYTHON_BASE:-docker.io/library/python:3.12-slim}
    environment:
      SYNAPSE_AI_BIND_ADDR: "0.0.0.0:50051"
      SYNAPSE_MODEL_PROVIDER: "${SYNAPSE_MODEL_PROVIDER:-mock}"
      SYNAPSE_MODEL_PROVIDER_ALIAS: "${SYNAPSE_MODEL_PROVIDER_ALIAS:-}"
      SYNAPSE_OPENAI_API_KEY: "${SYNAPSE_OPENAI_API_KEY:-}"
      SYNAPSE_OPENAI_BASE_URL: "${SYNAPSE_OPENAI_BASE_URL:-}"
      SYNAPSE_OPENAI_MODEL: "${SYNAPSE_OPENAI_MODEL:-gpt-4o-mini}"
      SYNAPSE_OPENAI_TEMPERATURE: "${SYNAPSE_OPENAI_TEMPERATURE:-0.2}"
      SYNAPSE_OPENAI_MAX_TOKENS: "${SYNAPSE_OPENAI_MAX_TOKENS:-512}"
      SYNAPSE_OPENAI_HTTP_TIMEOUT_SECONDS: "${SYNAPSE_OPENAI_HTTP_TIMEOUT_SECONDS:-45}"
      SYNAPSE_OPENAI_MAX_RETRIES: "${SYNAPSE_OPENAI_MAX_RETRIES:-3}"
      SYNAPSE_OPENAI_RETRY_BACKOFF_SECONDS: "${SYNAPSE_OPENAI_RETRY_BACKOFF_SECONDS:-1.5}"
    ports:
      - "50051:50051"

  postgres:
    image: ${POSTGRES_IMAGE:-docker.io/library/postgres:16-alpine}
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-docker.io/library/redis:7-alpine}
    ports:
      - "6379:6379"

volumes:
  postgres_data:
