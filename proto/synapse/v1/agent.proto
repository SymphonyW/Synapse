syntax = "proto3";

package synapse.v1;

option go_package = "github.com/synapse/synapse/services/gateway-go/internal/gen/synapse/v1;agentv1";

// 健康检查请求体，当前无字段。
message HealthRequest {}

// 健康检查响应，包含运行状态与模型提供方。
message HealthResponse {
  string status = 1;
  string model_provider = 2;
}

// 网关提交任务时传递的请求载荷。
message SubmitTaskRequest {
  string task_id = 1;
  string user_id = 2;
  string prompt = 3;
  map<string, string> metadata = 4;
}

// Agent 事件类型枚举。
enum AgentEventType {
  AGENT_EVENT_TYPE_UNSPECIFIED = 0;
  AGENT_EVENT_TYPE_STARTED = 1;
  AGENT_EVENT_TYPE_TOKEN = 2;
  AGENT_EVENT_TYPE_INFO = 3;
  AGENT_EVENT_TYPE_COMPLETED = 4;
  AGENT_EVENT_TYPE_FAILED = 5;
}

// Agent 流式事件载荷。
message AgentEvent {
  AgentEventType type = 1;
  string message = 2;
  string token = 3;
  string trace_id = 4;
  int64 emitted_at_unix_ms = 5;
}

// 长期记忆记录，和 AI Engine 内部 MemoryStore 结构保持同名字段。
message MemoryRecord {
  string memory_id = 1;
  string user_id = 2;
  string content = 3;
  string summary = 4;
  string source_task_id = 5;
  double importance = 6;
  int64 created_at = 7;
}

// 召回结果在记录之外附带当前查询的匹配分数和命中词。
message MemoryRecallHit {
  MemoryRecord record = 1;
  double score = 2;
  repeated string matched_terms = 3;
}

message MemoryWriteRequest {
  string user_id = 1;
  string content = 2;
  string summary = 3;
  string source_task_id = 4;
  double importance = 5;
}

message MemoryWriteResponse {
  MemoryRecord record = 1;
}

message MemoryRecallRequest {
  string user_id = 1;
  string query = 2;
  int32 limit = 3;
}

message MemoryRecallResponse {
  repeated MemoryRecallHit hits = 1;
}

message MemoryDeleteRequest {
  string user_id = 1;
  string memory_id = 2;
}

message MemoryDeleteResponse {
  bool deleted = 1;
}

message MemoryListRequest {
  string user_id = 1;
  int32 limit = 2;
}

message MemoryListResponse {
  repeated MemoryRecord items = 1;
}

// 运行时服务：提供健康检查、任务流式执行与长期记忆管理。
service AgentRuntime {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc SubmitTask(SubmitTaskRequest) returns (stream AgentEvent);
  rpc MemoryWrite(MemoryWriteRequest) returns (MemoryWriteResponse);
  rpc MemoryRecall(MemoryRecallRequest) returns (MemoryRecallResponse);
  rpc MemoryDelete(MemoryDeleteRequest) returns (MemoryDeleteResponse);
  rpc MemoryList(MemoryListRequest) returns (MemoryListResponse);
}
